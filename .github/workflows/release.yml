name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          OUTPUT=clusterrun-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}
          go build -ldflags "-X main.version=${VERSION}" -o "${OUTPUT}" ./clusterrun.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clusterrun-${{ matrix.goos }}-${{ matrix.goarch }}
          path: clusterrun-*-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: clusterrun-*
          generate_release_notes: true
